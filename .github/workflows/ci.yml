name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - run: make check
      - run: python examples/run_baseline.py
      - run: python scripts/score_predictions.py --expected data/sample_labels.jsonl --predicted data/sample_predictions.jsonl
